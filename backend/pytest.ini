[pytest]
# Put the backend package root (this directory) on sys.path so tests can import
# top-level packages (database, models, services, logic, characterization, ...).
# CI runs bare `pytest` from backend/, which — unlike `python -m pytest` — does not
# add the working directory to sys.path; without this the characterization suite
# fails to import `logic` and normal tests fail to import `database`/`models`.
pythonpath = .
