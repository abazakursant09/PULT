# Alembic configuration — PULT migration baseline (Sprint 69).
# Schema lifecycle is migration-driven in production. See docs/governance/schema_governance.md.
[alembic]
script_location = alembic
prepend_sys_path = .
# Database URL is resolved at runtime in alembic/env.py from config.settings
# (or the ALEMBIC_DATABASE_URL environment override). Do NOT hardcode it here.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
